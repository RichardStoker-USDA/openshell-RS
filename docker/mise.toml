# Docker tasks for navigator

[tasks."build:factory"]
description = "Build the factory Docker image"
dir = "{{config_root}}/.."
env = { RUST_BUILD_PROFILE = "debug", DOCKER_BUILDKIT = "1" }
run = "docker build -f docker/Dockerfile.factory -t navigator-factory --build-arg RUST_BUILD_PROFILE=${RUST_BUILD_PROFILE} ."

[tasks."build:all"]
description = "Build all Docker images"
depends = ["build:factory"]
